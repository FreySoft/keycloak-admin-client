name: "Enforce Branch Naming Convention"

# This workflow runs every time a Pull Request is opened or updated
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Branch Name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          REGEX="^(feature|bugfix|hotfix|chore|refactor)\/[A-Z]+-[0-9]+-[a-z0-9\-]+$"
          echo "Checking branch name: $BRANCH_NAME"

          if [[ ! $BRANCH_NAME =~ $REGEX ]]; then
            echo "::error:: Invalid branch name: '$BRANCH_NAME'"
            echo "Branch names must follow this format: [type]/[JIRA-KEY]-[short-description]"
            echo "Allowed types: feature, bugfix, hotfix, chore, refactor"
            echo "Example: feature/TEST-123-test-branch"
            echo "More information: https://freysoft.atlassian.net/wiki/x/AQA3Qg"
            exit 1
          else
            echo "Branch name '$BRANCH_NAME' follows the FreySoft convention!"
          fi
